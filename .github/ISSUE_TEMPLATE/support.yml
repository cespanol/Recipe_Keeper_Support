name: Recipe Keeper support
description: Request help without sharing recipe or account content.
title: "[Support] "
labels:
  - support
body:
  - type: markdown
    attributes:
      value: |
        This issue is public. Never include recipe text, source links, photos, clipboard contents, filenames or paths, Apple Account details, CloudKit identifiers, or signing information.
  - type: input
    id: version
    attributes:
      label: App version and build
      description: Copy the version shown in Recipe Keeper Settings.
      placeholder: 1.4 (5)
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Device class and system version
      placeholder: iPhone, iOS 26.5
    validations:
      required: true
  - type: input
    id: storage
    attributes:
      label: Storage and iCloud status
      description: Copy only the coarse status shown in Settings.
      placeholder: Saved on This iPhone; iCloud Available
    validations:
      required: false
  - type: input
    id: event
    attributes:
      label: Content-free event code
      description: Include only a Recipe Keeper event code if one is shown.
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps and expected result
      description: Describe actions without recipe names, content, URLs, screenshots, or identifiers.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed recipe content, links, images, paths, account details, and identifiers.
          required: true

